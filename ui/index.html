<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <link rel="shortcut icon" href="/favicon.ico">
  <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
  <meta name=viewport
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>海豹尬聊 SealChat</title>
  <script>
    (function () {
      var applyTitle = function (title) {
        if (typeof title !== 'string') return;
        var trimmed = title.trim();
        if (!trimmed) return;
        document.title = trimmed;
        window.__SEALCHAT_PAGE_TITLE__ = trimmed;
      };
      var applyFavicon = function (attachmentId, baseOrigin) {
        var href = '/favicon.ico';
        var trimmed = typeof attachmentId === 'string' ? attachmentId.trim().replace(/^id:/, '') : '';
        if (trimmed) {
          var origin = (baseOrigin || window.location.origin).replace(/\/$/, '');
          href = origin + '/api/v1/attachment/' + encodeURIComponent(trimmed) + '?v=' + encodeURIComponent(trimmed);
        }
        var links = document.querySelectorAll('link[rel~="icon"]');
        if (!links.length) {
          var link = document.createElement('link');
          link.rel = 'icon';
          document.head.appendChild(link);
          links = [link];
        }
        Array.prototype.forEach.call(links, function (link) {
          link.href = href;
        });
        window.__SEALCHAT_PAGE_FAVICON__ = href;
      };
      var requestConfig = function (base) {
        return fetch(base.replace(/\/$/, '') + '/api/v1/config', { credentials: 'include' }).then(function (resp) {
          if (!resp.ok) throw new Error('fetch failed');
          return resp.json();
        });
      };
      var origins = [window.location.origin];
      var devFallback = window.location.protocol + '//' + window.location.hostname + ':3212';
      if (origins.indexOf(devFallback) === -1) {
        origins.push(devFallback);
      }
      var idx = 0;
      var next = function () {
        if (idx >= origins.length) return;
        requestConfig(origins[idx]).then(function (config) {
          if (config && typeof config.pageTitle === 'string') {
            applyTitle(config.pageTitle);
          }
          if (config) {
            applyFavicon(config.faviconAttachmentId, origins[idx]);
          }
        }).catch(function () {
          idx += 1;
          next();
        });
      };
      next();
    })();
  </script>
  <!-- <script src="//cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script> -->
</head>

<body>
  <div id="app"></div>
  <script>
    if (!location.pathname.endsWith('/')) {
      var newPath = location.pathname.replace(/\/+$/, '') + '/';
      var nextUrl = newPath + location.search + location.hash;
      window.history.replaceState(null, document.title, nextUrl);
    }
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
