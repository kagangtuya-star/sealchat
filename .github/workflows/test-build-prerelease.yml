name: Test Build & Prerelease

on:
  push:
    branches:
      # 修改为你的开发分支
      - stable-dev
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: test-build-prerelease-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/sealchat
  PRERELEASE_TAG: dev-prerelease

jobs:
  ui-build:
    name: Build UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build UI
        run: |
          cd ui
          corepack enable
          yarn install
          yarn build-only

      - name: Upload UI resources
        uses: actions/upload-artifact@v4
        with:
          name: ui
          path: ./ui/dist

  prepare-prerelease:
    name: Prepare Prerelease Page
    runs-on: ubuntu-latest

    outputs:
      date: ${{ steps.build_info.outputs.DATE }}
      short_sha: ${{ steps.build_info.outputs.SHORT_SHA }}
      version: ${{ steps.build_info.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build info
        id: build_info
        run: |
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "DATE=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "VERSION=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Generate prerelease notes
        run: |
          set -euo pipefail

          VERSION="${{ steps.build_info.outputs.VERSION }}"

          cat > RELEASE_BODY.md <<EOF
          # SealChat 自动测试构建

          > 这是开发分支的自动构建版本，可能不稳定，不建议用于生产环境。

          ## 构建信息

          - 分支：\`${{ github.ref_name }}\`
          - Commit：\`${{ github.sha }}\`
          - 构建版本：\`${VERSION}\`
          - Workflow：[#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ## Docker 镜像

          \`\`\`bash
          docker pull ${{ env.IMAGE_NAME }}:dev
          docker pull ${{ env.IMAGE_NAME }}:prerelease
          docker pull ${{ env.IMAGE_NAME }}:${VERSION}
          docker pull ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          \`\`\`

          ## 下载

          请在本页面底部 Assets 中下载对应平台的测试包。
          EOF

      - name: Move prerelease tag to current commit
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "${{ env.PRERELEASE_TAG }}" "${{ github.sha }}"
          git push -f origin "refs/tags/${{ env.PRERELEASE_TAG }}"

      - name: Create or update prerelease page and clean old assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ env.PRERELEASE_TAG }}"
          TITLE="SealChat 自动测试构建 ${{ steps.build_info.outputs.VERSION }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Existing prerelease found, updating..."

            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file RELEASE_BODY.md \
              --prerelease \
              --latest=false

            echo "Deleting old assets..."

            ASSETS="$(gh release view "$TAG" --json assets --jq '.assets[].name')"

            if [ -n "$ASSETS" ]; then
              while IFS= read -r asset; do
                if [ -n "$asset" ]; then
                  gh release delete-asset "$TAG" "$asset" -y
                fi
              done <<< "$ASSETS"
            fi
          else
            echo "Prerelease does not exist, creating..."

            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file RELEASE_BODY.md \
              --prerelease \
              --latest=false \
              --target "${{ github.sha }}"
          fi

  backend-build:
    name: Build Server
    runs-on: ubuntu-latest
    needs:
      - ui-build
      - prepare-prerelease

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux_amd64
            goos: linux
            goarch: amd64
          - name: linux_arm64
            goos: linux
            goarch: arm64
          - name: windows_amd64
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download UI resources
        uses: actions/download-artifact@v4
        with:
          name: ui
          path: ./ui/dist

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          BUILD_VERSION: ${{ needs.prepare-prerelease.outputs.version }}
        run: |
          set -euo pipefail

          mkdir -p output

          if [ "${{ matrix.goos }}" = "linux" ]; then
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              CC="zig cc -target x86_64-linux-musl" \
                go build \
                -o "output/sealchat-server" \
                -trimpath \
                -ldflags "-s -w -linkmode external -extldflags '-static' -X sealchat/utils.BuildVersion=${BUILD_VERSION}" \
                .
            elif [ "${{ matrix.goarch }}" = "arm64" ]; then
              CC="zig cc -target aarch64-linux-musl" \
                go build \
                -o "output/sealchat-server" \
                -trimpath \
                -ldflags "-s -w -linkmode external -extldflags '-static' -X sealchat/utils.BuildVersion=${BUILD_VERSION}" \
                .
            else
              echo "Unsupported linux arch: ${{ matrix.goarch }}"
              exit 1
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            CC="zig cc -target x86_64-windows-gnu" \
              go build \
              -o "output/sealchat-server.exe" \
              -trimpath \
              -ldflags "-s -w -X sealchat/utils.BuildVersion=${BUILD_VERSION}" \
              .
          else
            echo "Unsupported OS: ${{ matrix.goos }}"
            exit 1
          fi

      - name: Prepare package
        run: |
          set -euo pipefail

          rm -rf package release
          mkdir -p package/bin release

          if [ "${{ matrix.goos }}" = "linux" ]; then
            cp output/sealchat-server package/

            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              WEBP_DIR="linux-x64"
            elif [ "${{ matrix.goarch }}" = "arm64" ]; then
              WEBP_DIR="linux-arm64"
            else
              echo "Unsupported arch: ${{ matrix.goarch }}"
              exit 1
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cp output/sealchat-server.exe package/
            WEBP_DIR="win-x64"
          else
            echo "Unsupported OS: ${{ matrix.goos }}"
            exit 1
          fi

          mkdir -p "package/bin/${WEBP_DIR}"
          cp -a "bin/${WEBP_DIR}/." "package/bin/${WEBP_DIR}/"

          cp bin/LICENSE package/LICENSE
          cp config.yaml.example package/
          cp config.docker.yaml.example package/

      - name: Compress package
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare-prerelease.outputs.version }}"

          if [ "${{ matrix.goos }}" = "linux" ]; then
            tar -czvf \
              "release/sealchat_test_${VERSION}_${{ matrix.name }}.tar.gz" \
              -C package .
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            cd package
            zip -r \
              "../release/sealchat_test_${VERSION}_${{ matrix.name }}.zip" \
              .
          fi

      - name: Upload package to prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release upload "${{ env.PRERELEASE_TAG }}" \
            ./release/* \
            --clobber

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - ui-build
      - prepare-prerelease

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download UI resources
        uses: actions/download-artifact@v4
        with:
          name: ui
          path: ./ui/dist

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io \
              -u "${{ github.actor }}" \
              --password-stdin

      - name: Build test image
        run: |
          docker build \
            --build-arg BUILD_VERSION="${{ needs.prepare-prerelease.outputs.version }}" \
            -t "${{ env.IMAGE_NAME }}:dev" \
            -t "${{ env.IMAGE_NAME }}:prerelease" \
            -t "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" \
            -t "${{ env.IMAGE_NAME }}:${{ needs.prepare-prerelease.outputs.version }}" \
            -f Dockerfile \
            .

      - name: Push test image
        run: |
          docker push "${{ env.IMAGE_NAME }}:dev"
          docker push "${{ env.IMAGE_NAME }}:prerelease"
          docker push "${{ env.IMAGE_NAME }}:sha-${{ github.sha }}"
          docker push "${{ env.IMAGE_NAME }}:${{ needs.prepare-prerelease.outputs.version }}"
